<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="image_hub.png">
    <link rel="icon" href="image_hub.png">
    <title>Fridge Combo - 100 Minimalist Tools</title>
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --card-bg: #fafafa;
            --radius: 15px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        header { text-align: left; padding: 0 10px; }
        h1 { font-size: 32px; margin: 0; font-weight: 900; letter-spacing: -1.5px; }
        .description { font-size: 14px; opacity: 0.6; margin-top: 8px; line-height: 1.4; }

        .tool-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tool-card {
            display: flex;
            align-items: center;
            padding: 15px;
            background-color: var(--card-bg);
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            text-decoration: none;
            color: var(--main);
            transition: transform 0.1s, border-color 0.1s;
        }
        .tool-card:active { transform: scale(0.98); border-color: var(--main); }

        .tool-icon {
            width: 50px;
            height: 50px;
            background: #fff;
            border-radius: 12px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid var(--accent);
        }
        .tool-icon img { width: 100%; height: 100%; object-fit: cover; }

        .tool-info h3 { margin: 0; font-size: 16px; font-weight: 800; }
        .tool-info p { margin: 4px 0 0; font-size: 12px; opacity: 0.5; }

        .badge {
            margin-left: auto;
            font-size: 10px;
            font-weight: 800;
            opacity: 0.3;
        }

        .support-area {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid var(--accent);
            padding-top: 25px;
        }

        .foot-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
        }

        footer {
            margin-top: auto;
            padding: 40px 0 20px;
            text-align: center;
            font-size: 11px;
            line-height: 1.8;
            opacity: 0.4;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Fridge Combo</h1>
        <div class="description">100 Minimalist Web Tools.<br>1 Tool / 1 Action / 0 Tracking.</div>
    </header>

    <div class="tool-list">
        <a href="invisible-char-remover.html" class="tool-card">
            <div class="tool-icon"><img src="image_42.png" alt="Invisible Eraser"></div>
            <div class="tool-info">
                <h3>Invisible Eraser</h3>
                <p>Remove hidden "dust" from your text.</p>
            </div>
            <div class="badge">#42</div>
        </a>

        <a href="mark-it.html" class="tool-card">
            <div class="tool-icon"><img src="image_41.png" alt="Mark It"></div>
            <div class="tool-info">
                <h3>Mark It</h3>
                <p>Text highlighting with markers.</p>
            </div>
            <div class="badge">#41</div>
        </a>

        </div>

    <div class="support-area">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="foot-btn">☕️buy me a coffee</a>
    </div>
</div>

<footer>
    No login / No tracking / No ads / Browser only<br>
    Privacy Policy / afrorakda © 2026
</footer>

</body>
</html>
