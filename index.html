<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>afrorakda Hub</title>
    
    <link rel="icon" href="image_1.png">
    <link rel="apple-touch-icon" href="image_1.png">

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fff; margin: 0; color: #111; -webkit-font-smoothing: antialiased; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 420px; padding: 30px 15px; box-sizing: border-box; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { text-align: left; margin-bottom: 30px; padding-left: 5px; }
        .title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
        h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -1px; margin: 0; }
        .progress-badge { 
            background: #333; color: #fff; padding: 2px 10px; 
            border-radius: 15px; font-size: 0.7rem; font-weight: 800; 
            letter-spacing: 0.5px; 
        }
        .subtitle { font-size: 0.85rem; color: #666; font-weight: 500; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .tool-link { text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        .tool-link:active { transform: scale(0.95); opacity: 0.8; }
        
        .icon-box { 
            width: 85%; margin: 0 auto; aspect-ratio: 1/1; 
            background: #fff; border: 1px solid #eee; border-radius: 12px; 
            overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.03); 
            display: flex; align-items: center; justify-content: center; 
        }
        .icon-box img { width: 100%; height: 100%; object-fit: cover; }
        .tool-name { margin-top: 8px; font-size: 0.7rem; font-weight: 700; color: #333; text-align: center; line-height: 1.2; }

        footer { margin-top: auto; padding: 40px 0 20px; text-align: center; font-size: 12px; color: #666; border-top: 1px solid #f0f0f0; }
        .kofi-btn { display: inline-block; background: #333; color: #fff; padding: 10px 20px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-bottom: 20px; font-size: 13px; }
        .footer-line { line-height: 1.6; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="title-row">
            <h1>afrorakda Hub</h1>
            <span class="progress-badge">35 / 100</span>
        </div>
        <p class="subtitle">Building 100 minimalist tools for your daily life.</p>
    </header>

    <div class="grid">
        <a href="https://afrorakda.github.io/contrast-checker/" class="tool-link">
            <div class="icon-box"><img src="image_31.png" alt="Contrast Checker"></div>
            <span class="tool-name">Contrast Checker</span>
        </a>
        <a href="https://afrorakda.github.io/json-to-csv/" class="tool-link">
            <div class="icon-box"><img src="image_32.png" alt="JSON to CSV"></div>
            <span class="tool-name">JSON to CSV</span>
        </a>
        <a href="https://afrorakda.github.io/quick-clip/" class="tool-link">
            <div class="icon-box"><img src="image_33.png" alt="Quick Clip"></div>
            <span class="tool-name">Quick Clip</span>
        </a>
        <a href="https://afrorakda.github.io/quick-image-resizer/" class="tool-link">
            <div class="icon-box"><img src="image_34.png" alt="Quick Image Resizer"></div>
            <span class="tool-name">Quick Image Resizer</span>
        </a>
        <a href="https://afrorakda.github.io/8-rounds-tabata/" class="tool-link">
            <div class="icon-box"><img src="image_35.png" alt="8 Rounds Tabata"></div>
            <span class="tool-name">8 Rounds Tabata</span>
        </a>
    </div>

    <footer>
        <a href="https://ko-fi.com/afrorakda" target="_blank" rel="noopener" class="kofi-btn">☕ Support me on Ko-fi</a>
        <div class="footer-line">
            <div>No login / No tracking / No ads</div>
            <div>Privacy Policy</div>
            <div style="margin-top: 8px; font-weight: bold; color: #333;">afrorakda © 2026</div>
        </div>
    </footer>
</div>

</body>
</html>
