<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fridge Combo - Minimalist Tools Hub</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #fafafa;
            --radius: 15px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--main);
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 { font-size: 2.5rem; font-weight: 900; margin: 0; letter-spacing: -2px; }
        .progress-container {
            margin-top: 10px;
            font-size: 0.9rem;
            font-weight: 800;
        }
        .progress-badge {
            background: var(--main);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* Tool Grid */
        .tool-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .tool-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--main);
            background: var(--accent);
            padding: 15px;
            border-radius: var(--radius);
            transition: transform 0.1s;
        }
        .tool-link:active { transform: scale(0.98); }
        .icon-box {
            width: 50px;
            height: 50px;
            background: #fff;
            border-radius: 12px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #eee;
        }
        .icon-box img { width: 100%; height: 100%; object-fit: cover; }
        .tool-name { font-size: 1.1rem; font-weight: 800; }

        footer {
            margin-top: 60px;
            text-align: center;
            border-top: 1px solid #eee;
            padding-top: 30px;
        }
        .kofi-btn {
            display: inline-flex;
            background: var(--main);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .legal {
            font-size: 10px;
            color: #ccc;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Fridge Combo</h1>
        <div class="progress-container">
            <span class="progress-badge">29 / 100</span>
        </div>
    </header>

    <div class="tool-grid">
        <a href="https://afrorakda.github.io/json-key-picker/" class="tool-link">
            <div class="icon-box"><img src="image_29.png" alt="JSON Key Picker"></div>
            <span class="tool-name">JSON Key Picker</span>
        </a>

        <a href="https://afrorakda.github.io/json-clean/" class="tool-link">
            <div class="icon-box"><img src="image_json_clean.png" alt="JSON Clean"></div>
            <span class="tool-name">JSON Clean</span>
        </a>

        </div>

    <footer>
        <a href="https://ko-fi.com/afrorakda" class="kofi-btn">☕ Support me on Ko-fi</a>
        <p class="legal">
            No login / No tracking / No ads / Browser only<br>
            Privacy Policy / afrorakda © 2026
        </p>
    </footer>
</div>

</body>
</html>
